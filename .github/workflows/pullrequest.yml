name: Pull request

on:
  pull_request:
    paths-ignore:
      - '**.md'
      - '.gitignore'
      - 'LICENSE'
      - 'CODEOWNERS'
      - '.github/workflows/dependabot.yml'

jobs:
  run-tests:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-java@v5.2.0
        with:
          distribution: temurin
          java-version: 25
          cache: maven
      - name: Bygge og installere moduler
        run: ./mvnw install
      - name: Kjøre tester i testapp
        run: ./mvnw -f dusseldorf-ktor-testapp/pom.xml test
